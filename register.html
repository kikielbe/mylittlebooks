<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
  <meta name="theme-color" content="#FFFFFF"/>
  <title>Daftar — My Little Books</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="assets/css/app.css" rel="stylesheet"/>
  <style>
    body {
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
      padding: 1rem; background: var(--bg);
    }
    .reg-wrap {
      width: 100%; max-width: 400px;
      animation: loginIn .5s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes loginIn {
      from { opacity:0; transform:translateY(24px) scale(.96); }
      to   { opacity:1; transform:none; }
    }
    .brand-mark { text-align:center; margin-bottom:1.75rem; }
    .brand-icon {
      width:64px; height:64px; background:var(--accent-bg);
      border:2px solid var(--accent); border-radius:18px;
      display:flex; align-items:center; justify-content:center;
      font-size:1.8rem; margin:0 auto .75rem;
    }
    .brand-name {
      font-family:'Cormorant Garamond',serif; font-size:1.6rem;
      font-weight:700; font-style:italic; color:var(--accent);
    }
    .reg-card {
      background:var(--bg-2); border:1px solid var(--border);
      border-radius:20px; padding:1.75rem; box-shadow:var(--shadow);
    }
    .field-wrap { position:relative; margin-bottom:1rem; }
    .field-icon {
      position:absolute; left:.9rem; top:50%; transform:translateY(-50%);
      color:var(--text-3); pointer-events:none;
    }
    .field-icon-top { top:.85rem; transform:none; }
    .field-wrap .form-control { padding-left:2.5rem !important; }
    .btn-register {
      width:100%; padding:.75rem; background:var(--accent); border:none;
      border-radius:var(--radius-sm); color:#fff; font-weight:700;
      font-size:1rem; cursor:pointer; transition:all var(--t);
      display:flex; align-items:center; justify-content:center; gap:.5rem;
      box-shadow:0 4px 14px rgba(245,166,35,.35);
    }
    .btn-register:hover { background:var(--accent-d); transform:translateY(-1px); }
    .btn-register:active { transform:scale(.97); }
    .btn-register:disabled { opacity:.6; cursor:not-allowed; transform:none; }
    .alert-error {
      background:var(--red-bg); border:1px solid rgba(239,68,68,.25);
      color:var(--red); border-radius:var(--radius-sm);
      padding:.6rem .9rem; font-size:.85rem;
      display:flex; align-items:center; gap:.5rem;
      animation:errorShake .4s ease; margin-bottom:1rem;
    }
    @keyframes errorShake {
      0%,100% { transform:translateX(0); }
      20%,60%  { transform:translateX(-5px); }
      40%,80%  { transform:translateX(5px); }
    }
    .strength-bar { height:4px; background:var(--bg-3); border-radius:2px; margin-top:4px; }
    .strength-fill { height:100%; border-radius:2px; transition:width .3s, background .3s; }
    .theme-btn { position:fixed; top:1rem; right:1rem; z-index:10; }
  </style>
</head>
<body>

<button class="btn-icon theme-btn" onclick="toggleThemeReg()" title="Toggle tema">
  <i class="bi bi-sun icon-sun"></i>
  <i class="bi bi-moon icon-moon"></i>
</button>

<div class="reg-wrap">
  <div class="brand-mark">
    <div class="brand-icon">📚</div>
    <div class="brand-name">My Little Books</div>
    <div style="font-size:.8rem;color:var(--text-3);margin-top:.2rem">Buat akun baru</div>
  </div>

  <div class="reg-card">
    <div id="alert-box" class="alert-error d-none"></div>

    <div class="field-wrap">
      <i class="bi bi-person field-icon"></i>
      <input type="text" id="display_name" class="form-control" placeholder="Nama tampilan kamu"/>
    </div>

    <div class="field-wrap">
      <i class="bi bi-at field-icon"></i>
      <input type="text" id="username" class="form-control" placeholder="Username (huruf, angka, _)"/>
    </div>

    <div class="field-wrap">
      <i class="bi bi-envelope field-icon"></i>
      <input type="email" id="email" class="form-control" placeholder="Email (opsional)"/>
    </div>

    <div class="field-wrap">
      <i class="bi bi-lock field-icon"></i>
      <input type="password" id="password" class="form-control" placeholder="Password (min. 6 karakter)"
        oninput="checkStrength(this.value)"/>
      <div class="strength-bar mt-1">
        <div class="strength-fill" id="strength-fill" style="width:0%;background:var(--red)"></div>
      </div>
    </div>

    <div class="field-wrap mb-3">
      <i class="bi bi-lock-fill field-icon"></i>
      <input type="password" id="confirm_password" class="form-control" placeholder="Konfirmasi password"/>
    </div>

    <button class="btn-register" id="btn-reg">
      <span id="btn-text"><i class="bi bi-person-plus-fill me-1"></i>Buat Akun</span>
      <span id="btn-spin" class="d-none spinner-border spinner-border-sm"></span>
    </button>

    <div class="text-center mt-3" style="font-size:.85rem;color:var(--text-2)">
      Sudah punya akun?
      <a href="login.html" style="color:var(--accent);font-weight:600">Masuk</a>
    </div>
  </div>

  <p class="text-center mt-3" style="font-size:.72rem;color:var(--text-3)">
    <a href="welcome.html" style="color:var(--text-3)">← Kembali ke beranda</a>
  </p>
</div>

<script>
  const saved = localStorage.getItem('mlb-theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);

  function toggleThemeReg() {
    const cur = document.documentElement.getAttribute('data-theme');
    const next = cur === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('mlb-theme', next);
  }

  function checkStrength(pw) {
    const fill = document.getElementById('strength-fill');
    let score = 0;
    if (pw.length >= 6) score++;
    if (pw.length >= 10) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^a-zA-Z0-9]/.test(pw)) score++;
    const colors = ['var(--red)','var(--red)','var(--accent)','var(--accent-d)','var(--green)'];
    fill.style.width  = (score * 20) + '%';
    fill.style.background = colors[score] || colors[0];
  }

  function showError(msg) {
    const b = document.getElementById('alert-box');
    b.innerHTML = `<i class="bi bi-exclamation-circle"></i> ${msg}`;
    b.classList.remove('d-none');
  }

  function setLoading(on) {
    document.getElementById('btn-reg').disabled = on;
    document.getElementById('btn-text').classList.toggle('d-none', on);
    document.getElementById('btn-spin').classList.toggle('d-none', !on);
  }

  // Enter key on any field
  document.querySelectorAll('input').forEach(el =>
    el.addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); })
  );
  document.getElementById('btn-reg').addEventListener('click', doRegister);

  async function doRegister() {
    document.getElementById('alert-box').classList.add('d-none');

    const display  = document.getElementById('display_name').value.trim();
    const username = document.getElementById('username').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm_password').value;

    if (!display)   { showError('Nama tampilan wajib diisi'); return; }
    if (!username)  { showError('Username wajib diisi'); return; }
    if (!/^[a-zA-Z0-9_\.]+$/.test(username)) {
      showError('Username hanya boleh huruf, angka, underscore, titik'); return;
    }
    if (!password)  { showError('Password wajib diisi'); return; }
    if (password.length < 6) { showError('Password minimal 6 karakter'); return; }
    if (password !== confirm) { showError('Konfirmasi password tidak cocok'); return; }

    setLoading(true);
    try {
      const res  = await fetch('api/auth.php?action=register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password, display_name: display, email })
      });
      const data = await res.json();
      if (data.success) {
        window.location.href = 'index.html';
      } else {
        showError(data.error || 'Registrasi gagal');
        setLoading(false);
      }
    } catch(e) {
      showError('Koneksi gagal. Pastikan server berjalan.');
      setLoading(false);
    }
  }
</script>
</body>
</html>

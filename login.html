<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
  <meta name="theme-color" content="#0a0a0a"/>
  <title>My Little Books</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="assets/css/app.css" rel="stylesheet"/>
  <style>
    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
      position: relative; overflow: hidden;
    }

    /* Animated background blobs */
    .bg-blob {
      position: fixed; border-radius: 50%; filter: blur(80px);
      pointer-events: none; z-index: 0;
      animation: blobFloat 8s ease-in-out infinite;
    }
    .bg-blob-1 {
      width: 300px; height: 300px;
      background: rgba(201,169,110,.06);
      top: -80px; left: -80px;
      animation-delay: 0s;
    }
    .bg-blob-2 {
      width: 250px; height: 250px;
      background: rgba(232,213,176,.04);
      bottom: -60px; right: -60px;
      animation-delay: -3s;
    }
    @keyframes blobFloat {
      0%, 100% { transform: translate(0,0) scale(1); }
      33%       { transform: translate(20px,-15px) scale(1.05); }
      66%       { transform: translate(-15px,10px) scale(.97); }
    }

    .login-wrap {
      width: 100%; max-width: 380px;
      position: relative; z-index: 1;
      animation: loginIn .6s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes loginIn {
      from { opacity:0; transform: translateY(32px) scale(.95); }
      to   { opacity:1; transform: none; }
    }

    .brand-mark {
      text-align: center; margin-bottom: 2rem;
    }
    .brand-icon-wrap {
      width: 72px; height: 72px;
      background: var(--bg-2);
      border: 1px solid var(--border-2);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
      font-size: 2rem;
      box-shadow: 0 8px 32px rgba(201,169,110,.12), var(--glow);
      transition: transform .3s;
      animation: iconBounce .8s cubic-bezier(.34,1.56,.64,1) .2s both;
    }
    @keyframes iconBounce {
      from { transform: scale(0) rotate(-20deg); }
      to   { transform: scale(1) rotate(0); }
    }
    .brand-icon-wrap:hover { transform: scale(1.05) rotate(-3deg); }

    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem; font-weight: 700; font-style: italic;
      color: var(--accent); letter-spacing: .01em;
    }
    .brand-tagline { font-size: .8rem; color: var(--text-3); margin-top: .2rem; letter-spacing: .08em; text-transform: uppercase; }

    .login-card {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 1.75rem;
      box-shadow: var(--shadow);
    }

    .field-group { margin-bottom: 1rem; }

    .input-wrap {
      position: relative;
    }
    .input-wrap .field-icon {
      position: absolute; left: .9rem; top: 50%; transform: translateY(-50%);
      color: var(--text-3); font-size: .95rem; pointer-events: none;
      transition: color var(--t);
    }
    .input-wrap:focus-within .field-icon { color: var(--accent); }
    .input-wrap .form-control { padding-left: 2.5rem !important; }
    .input-wrap .btn-eye {
      position: absolute; right: .75rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text-3);
      padding: .25rem; cursor: pointer; transition: color var(--t);
    }
    .input-wrap .btn-eye:hover { color: var(--accent); }

    .btn-login {
      width: 100%; padding: .75rem;
      background: var(--accent); border: none;
      border-radius: var(--radius-sm);
      font-family: 'Outfit', sans-serif;
      font-weight: 600; font-size: 1rem;
      color: #0a0a0a; cursor: pointer;
      transition: all var(--t);
      display: flex; align-items: center; justify-content: center; gap: .5rem;
      position: relative; overflow: hidden;
    }
    .btn-login::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.15) 0%, transparent 100%);
      opacity: 0; transition: opacity var(--t);
    }
    .btn-login:hover { background: var(--accent-2); box-shadow: var(--glow); transform: translateY(-1px); }
    .btn-login:hover::after { opacity: 1; }
    .btn-login:active { transform: scale(.97); }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    .alert-error {
      background: rgba(248,113,113,.1);
      border: 1px solid rgba(248,113,113,.25);
      color: var(--red); border-radius: var(--radius-sm);
      padding: .6rem .9rem; font-size: .85rem;
      display: flex; align-items: center; gap: .5rem;
      animation: errorShake .4s ease;
    }
    @keyframes errorShake {
      0%,100% { transform: translateX(0); }
      20%,60%  { transform: translateX(-6px); }
      40%,80%  { transform: translateX(6px); }
    }

    .theme-btn-login {
      position: fixed; top: 1rem; right: 1rem;
      z-index: 10;
    }

    .version { text-align: center; font-size: .72rem; color: var(--text-3); margin-top: 1.25rem; letter-spacing: .05em; }
  </style>
</head>
<body>
  <!-- Theme toggle -->
  <button class="btn-icon theme-btn-login" id="theme-toggle-login" onclick="toggleThemeLogin()" title="Toggle tema">
    <i class="bi bi-sun icon-sun"></i>
    <i class="bi bi-moon icon-moon"></i>
  </button>

  <!-- BG Blobs -->
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>

  <div class="login-wrap">
    <!-- Brand -->
    <div class="brand-mark">
      <div class="brand-icon-wrap">📚</div>
      <div class="brand-name">My Little Books</div>
      <div class="brand-tagline">Jurnal Baca Pribadi</div>
    </div>

    <!-- Card -->
    <div class="login-card">
      <div id="alert-box" class="alert-error mb-3 d-none"></div>

      <div class="field-group">
        <label class="form-label">Username</label>
        <div class="input-wrap">
          <i class="bi bi-person field-icon"></i>
          <input type="text" id="username" class="form-control" placeholder="Masukkan username" autocomplete="username"/>
        </div>
      </div>

      <div class="field-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <i class="bi bi-lock field-icon"></i>
          <input type="password" id="password" class="form-control" placeholder="Masukkan password" autocomplete="current-password"/>
          <button class="btn-eye" type="button" id="toggle-pw" tabindex="-1">
            <i class="bi bi-eye" id="pw-icon"></i>
          </button>
        </div>
      </div>

      <button class="btn-login mt-1" id="btn-login">
        <span id="btn-text"><i class="bi bi-arrow-right-circle me-1"></i>Masuk</span>
        <span id="btn-spin" class="d-none">
          <span class="spinner-border spinner-border-sm"></span> Memproses...
        </span>
      </button>
    </div>

    <div class="text-center mt-3" style="font-size:.85rem;color:var(--text-2)">
      Belum punya akun?
      <a href="register.html" style="color:var(--accent);font-weight:600">Daftar</a>
    </div>
    <p class="version mt-2"><a href="welcome.html" style="color:var(--text-3)">← Kembali ke beranda</a></p>
  </div>

<script>
  // Theme persistence
  const saved = localStorage.getItem('mlb-theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);

  function toggleThemeLogin() {
    const cur = document.documentElement.getAttribute('data-theme');
    const next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('mlb-theme', next);
  }

  // Toggle PW
  document.getElementById('toggle-pw').addEventListener('click', () => {
    const pw = document.getElementById('password');
    const ic = document.getElementById('pw-icon');
    if (pw.type === 'password') { pw.type = 'text'; ic.className = 'bi bi-eye-slash'; }
    else                        { pw.type = 'password'; ic.className = 'bi bi-eye'; }
  });

  // Enter key
  ['username','password'].forEach(id =>
    document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); })
  );
  document.getElementById('btn-login').addEventListener('click', doLogin);

  function showError(msg) {
    const b = document.getElementById('alert-box');
    b.innerHTML = `<i class="bi bi-exclamation-circle"></i> ${msg}`;
    b.classList.remove('d-none');
  }
  function setLoading(on) {
    document.getElementById('btn-login').disabled = on;
    document.getElementById('btn-text').classList.toggle('d-none', on);
    document.getElementById('btn-spin').classList.toggle('d-none', !on);
  }

  async function doLogin() {
    document.getElementById('alert-box').classList.add('d-none');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    if (!username || !password) { showError('Username dan password wajib diisi'); return; }
    setLoading(true);
    try {
      const res  = await fetch('api/auth.php?action=login', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({username, password})
      });
      const data = await res.json();
      if (data.success) { window.location.href = 'index.html'; }
      else              { showError(data.error || 'Login gagal'); setLoading(false); }
    } catch(e) {
      showError('Koneksi gagal. Pastikan server berjalan.');
      setLoading(false);
    }
  }
</script>
</body>
</html>
